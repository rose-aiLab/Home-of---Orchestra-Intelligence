<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>和智 · Orchestra Intelligence</title>
<style>
  html,body{margin:0;height:100%;background:#1A1511;overflow:hidden;font-family:-apple-system,"Hiragino Sans","Segoe UI",sans-serif;}
  .stage{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(60% 55% at 50% 42%, #3A2416 0%, #221913 55%, #160F0B 100%);}
  .glow{position:absolute;width:60vmin;height:60vmin;top:50%;left:50%;transform:translate(-50%,-62%);
    background:radial-gradient(circle, rgba(244,137,47,0.35), rgba(244,137,47,0) 65%);filter:blur(6px);
    animation:breathe 4s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:.55;transform:translate(-50%,-62%) scale(.96)}50%{opacity:.85;transform:translate(-50%,-62%) scale(1.04)}}
  .fig{width:42vmin;height:auto;filter:drop-shadow(0 6px 24px rgba(0,0,0,.45));
    animation:rise 1.4s cubic-bezier(.2,.7,.2,1) both;}
  @keyframes rise{from{opacity:0;transform:translateY(16px) scale(.95)}to{opacity:1;transform:none}}
  .bars{transform-box:fill-box;transform-origin:50% 60%;animation:beat 1.7s ease-in-out .9s infinite;}
  @keyframes beat{0%,100%{transform:scale(1)}18%{transform:scale(1.10)}32%{transform:scale(1)}46%{transform:scale(1.06)}60%{transform:scale(1)}}
  .waves{transform-box:fill-box;transform-origin:50% 50%;animation:flow 3.4s ease-in-out infinite alternate;}
  @keyframes flow{from{transform:translateX(-1.4px)}to{transform:translateX(1.4px)}}
  .mind{animation:spark 2.6s ease-in-out infinite;}
  @keyframes spark{0%,100%{opacity:.55}50%{opacity:1}}
  .word{width:46vmin;height:auto;margin-top:3.4vmin;opacity:0;animation:wordin 1s ease-out 1.1s both;}
  @keyframes wordin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .tls{position:relative;height:5vmin;margin-top:2.2vmin;width:90vw;text-align:center;}
  .tl{position:absolute;left:0;right:0;opacity:0;color:#F6D8B6;font-size:2.5vmin;letter-spacing:.04em;
    animation:cyc 12s ease-in-out 2s infinite;}
  .tl:nth-child(2){animation-delay:6s}
  .tl:nth-child(3){animation-delay:10s}
  @keyframes cyc{0%{opacity:0;transform:translateY(6px)}4%{opacity:1;transform:none}26%{opacity:1}32%{opacity:0}100%{opacity:0}}
  /* with 3 lines on a 12s loop offset by ~ -... use 18s? keep simple: stagger via delay, each ~ shows once */
  .tl:nth-child(1){animation-duration:18s} .tl:nth-child(2){animation-duration:18s;animation-delay:6s} .tl:nth-child(3){animation-duration:18s;animation-delay:12s}
  .snd{position:fixed;bottom:5vmin;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.10);color:#F6D8B6;border:1px solid rgba(246,216,182,.45);padding:.7em 1.25em;border-radius:999px;font-size:1.9vmin;letter-spacing:.04em;cursor:pointer;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);transition:background .2s;animation:hint 2.4s ease-in-out 1.4s 3;}
  .snd:hover{background:rgba(255,255,255,.2)}
  @keyframes hint{0%,100%{box-shadow:0 0 0 0 rgba(246,216,182,0)}50%{box-shadow:0 0 0 7px rgba(246,216,182,.13)}}
  @media (max-width:600px){ .fig{width:60vmin} .word{width:46vmin} .tl{font-size:3.6vmin} }
</style></head>

  <div class="tls">
    <div class="tl">Minds in concert, warm at heart.</div>
    <div class="tl">众智合奏 · 以智暖心</div>
    <div class="tl">響き合い、心は温かく</div>
  </div>
</div>
  <button id="snd" class="snd" type="button">♪ Play with sound</button>
  <script>
(function(){
  var btn=document.getElementById('snd');
  var ctx,master,lp,started=false,on=false,nextT=0,idx=0,chordDur=4.0;
  var prog=[
    [196.00,246.94,293.66],
    [220.00,261.63,329.63],
    [174.61,220.00,261.63],
    [196.00,261.63,329.63]
  ];
  function pad(freqs,t,dur){
    freqs.forEach(function(f){
      [['sine',0.10],['triangle',0.045]].forEach(function(v){
        var o=ctx.createOscillator(),g=ctx.createGain();
        o.type=v[0];o.frequency.value=f;o.connect(g);g.connect(master);
        g.gain.setValueAtTime(0.0001,t);
        g.gain.linearRampToValueAtTime(v[1],t+1.0);
        g.gain.setValueAtTime(v[1],t+dur-1.2);
        g.gain.linearRampToValueAtTime(0.0001,t+dur);
        o.start(t);o.stop(t+dur+0.1);
      });
    });
  }
  function bell(f,t,vol){
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.type='triangle';o.frequency.value=f;o.connect(g);g.connect(master);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(vol,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+1.6);
    o.start(t);o.stop(t+1.7);
  }
  function tick(){
    while(nextT < ctx.currentTime + 0.4){
      var c=prog[idx%prog.length];
      pad(c,nextT,chordDur);
      bell(c[0]/2,nextT,0.05);
      var order=[c[2],c[1],c[2]*2,c[1]*2];
      for(var k=0;k<4;k++){ bell(order[k],nextT+0.5+k*(chordDur/4),0.033); }
      nextT+=chordDur; idx++;
    }
  }
  function start(){
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=2400;
    master=ctx.createGain();master.gain.value=0.0;
    master.connect(lp);lp.connect(ctx.destination);
    nextT=ctx.currentTime+0.15;idx=0;tick();setInterval(tick,200);started=true;
  }
  function setOn(state){
    on=state;
    master.gain.cancelScheduledValues(ctx.currentTime);
    master.gain.linearRampToValueAtTime(state?0.6:0.0, ctx.currentTime+0.4);
    btn.textContent = state ? '♪ Sound on' : '♪ Sound off';
    btn.style.animation='none';
  }
  btn.addEventListener('click',function(){
    if(!started){ start(); if(ctx.resume)ctx.resume(); setOn(true); }
    else { if(ctx.resume)ctx.resume(); setOn(!on); }
  });
})();
</script>
